<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.25" fill="#f5f0e5"/>
    </pattern>
    <pattern id="stripes" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="4" height="12" fill="#101114" opacity=".28"/>
    </pattern>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="9" fill="#d7193f" stroke="#101114" stroke-width="4"/>
  <rect x="5" y="5" width="54" height="54" rx="6" fill="url(#stripes)"/>
  <rect x="5" y="5" width="54" height="54" rx="6" fill="url(#dots)"/>

  <g transform="rotate(3 32 32)">
    <rect x="17" y="17" width="32" height="32" fill="#101114" transform="translate(3 3)"/>
    <rect x="17" y="17" width="32" height="32" fill="#f4b900" stroke="#101114" stroke-width="3"/>
    <text x="33" y="39" fill="#101114" font-family="Arial Black, Arial, sans-serif" font-size="21" font-weight="900" text-anchor="middle">C!</text>
  </g>
</svg>
